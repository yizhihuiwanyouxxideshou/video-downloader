<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频下载器</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 50px auto; padding: 0 20px; }
        .input-area { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 10px; font-size: 16px; border: 2px solid #ddd; border-radius: 5px; }
        button { padding: 10px 20px; background: #1e88e5; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #1565c0; }
        .task { border: 1px solid #ddd; border-radius: 5px; padding: 15px; margin-bottom: 10px; }
        .progress-bar { height: 10px; background: #eee; border-radius: 5px; margin: 10px 0; }
        .progress-fill { height: 100%; background: #4caf50; border-radius: 5px; transition: width 0.3s; }
        .status { color: #666; font-size: 14px; }
    </style>
</head>
<body>
    <h1>🎬 全网视频下载器</h1>
    
    <div class="input-area">
        <input type="text" id="urlInput" placeholder="粘贴视频链接，比如B站、YouTube...">
        <button onclick="startDownload()">开始下载</button>
    </div>
    
    <div id="taskList"></div>

    <script>
        async function startDownload() {
            const url = document.getElementById('urlInput').value.trim();
            if (!url) { alert('请输入视频链接'); return; }
            
            const res = await fetch('/api/download', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url })
            });
            const data = await res.json();
            addTask(data.task_id);
            document.getElementById('urlInput').value = '';
            pollTask(data.task_id);
        }

        function addTask(taskId) {
            const div = document.createElement('div');
            div.className = 'task';
            div.id = 'task-' + taskId;
            div.innerHTML = `
                <div><strong>任务 ${taskId}</strong></div>
                <div class="progress-bar"><div class="progress-fill" style="width: 0%"></div></div>
                <div class="status">等待中...</div>
            `;
            document.getElementById('taskList').prepend(div);
        }

        async function pollTask(taskId) {
            const interval = setInterval(async () => {
                const res = await fetch('/api/tasks/' + taskId);
                const task = await res.json();
                const taskEl = document.getElementById('task-' + taskId);
                
                const progress = task.progress || '0%';
                taskEl.querySelector('.progress-fill').style.width = progress;
                taskEl.querySelector('.status').textContent = 
                    `状态: ${task.status} | 进度: ${progress} | 速度: ${task.speed || '0'}`;
                
                if (task.status === 'completed') {
                    clearInterval(interval);
                    taskEl.querySelector('.status').innerHTML += `<br><a href="/downloads/${task.filename}" target="_blank">点击下载文件</a>`;
                }
                if (task.status === 'error') {
                    clearInterval(interval);
                    taskEl.querySelector('.status').textContent = '下载失败: ' + task.error;
                }
            }, 1000);
        }
    </script>
</body>
</html>
